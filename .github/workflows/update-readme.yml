name: Update README Only

# Trigger manually to regenerate README from existing job data
# Use this when you want to:
# - Update banners/images/links in the README template
# - Test readme-generator.js changes
# - Regenerate README without fetching new jobs

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 1
        ref: ${{ github.ref_name }}
        submodules: true
        token: ${{ secrets.GH_PAT }}

    - name: Setup pipeline
      uses: ./.github/scripts/shared/actions/setup-pipeline/action.yml

    - name: Update README from existing data
      env:
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: node .github/scripts/job-fetcher/update-readme-only.js

    - name: Stash npm changes
      run: git stash push -m "npm changes" package.json package-lock.json || true

    - name: Commit and push changes
      id: push
      uses: ./.github/scripts/shared/actions/commit-and-push/action.yml
      with:
        commit-message: 'chore: regenerate README from existing job data via update-readme-only workflow'
        files: 'README.md'

    - name: Create job summary
      run: |
        echo "## README Updated!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.push.outputs.changed }}" == "true" ]; then
          echo "**README.md regenerated**" >> $GITHUB_STEP_SUMMARY
        else
          echo "**No changes to README**" >> $GITHUB_STEP_SUMMARY
        fi
