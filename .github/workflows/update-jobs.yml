name: Update Jobs from Aggregator

on:
  workflow_dispatch:  # Triggered by job-board-cron-worker (Cloudflare) every 15 min
  push:
    branches: [ main ]
    paths:
      - '.github/scripts/job-fetcher/**'
      - '.github/scripts/write-current-jobs.js'

# Prevent concurrent runs to avoid git conflicts
concurrency:
  group: job-updates-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
    - name: Setup pipeline
      uses: ./.github/scripts/shared/actions/setup-pipeline/action.yml
      with:
        token: ${{ secrets.GH_PAT }}

    - name: Fetch and update jobs
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: |
        mkdir -p .github/logs .github/data
        ALL_JOBS_SHA=$(curl -sf -H "Authorization: token $GH_PAT" \
          "https://api.github.com/repos/zapplyjobs/jobs-data-2026/commits/main" \
          | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).sha)}catch(e){console.log('unknown')}})" \
          || echo "unknown")
        export ALL_JOBS_SHA
        node .github/scripts/job-fetcher/index.js 2>&1 | tee .github/logs/job-fetcher.log

    - name: Write current_jobs.json for aggregator
      run: |
        mkdir -p .github/data
        node .github/scripts/write-current-jobs.js

    - name: Count-drop alert
      uses: ./.github/scripts/shared/actions/count-drop-alert/action.yml
      with:
        discord-token: ${{ secrets.DISCORD_TEAM_TOKEN }}
        discord-channel-id: '1477002891234512916'

    - name: Display job-fetcher logs (always run)
      if: always()
      run: |
        echo "Job Fetcher Output (last 100 lines):"
        tail -100 .github/logs/job-fetcher.log || echo "Log file not found"

    - name: Compute commit message
      id: msg
      run: |
        JOB_COUNT=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('.github/data/current_jobs.json','utf8'));console.log(Array.isArray(d)?d.length:0)}catch(e){console.log(0)}")
        echo "msg=Update jobs - $(date +'%Y-%m-%d %H:%M UTC') | Found $JOB_COUNT positions" >> $GITHUB_OUTPUT

    - name: Commit and push changes
      id: push
      uses: ./.github/scripts/shared/actions/commit-and-push/action.yml
      with:
        commit-message: ${{ steps.msg.outputs.msg }}
        files: 'README.md .github/data/current_jobs.json .github/data/new_jobs.json .github/data/last_count.json .github/data/run_metrics.json .github/logs/'

    - name: Create job summary
      run: |
        echo "## Jobs Updated!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.push.outputs.changed }}" == "true" ]; then
          JOB_COUNT=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('.github/data/current_jobs.json','utf8'));console.log(Array.isArray(d)?d.length:0)}catch(e){console.log(0)}")
          echo "Successfully updated new grad job board" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Today's Update:" >> $GITHUB_STEP_SUMMARY
          echo "- **$JOB_COUNT total positions** from centralized aggregator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next update**: In ~15 minutes" >> $GITHUB_STEP_SUMMARY
        else
          echo "No changes detected - job board is current" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next check**: In ~15 minutes" >> $GITHUB_STEP_SUMMARY
        fi
